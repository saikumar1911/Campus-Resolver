<!DOCTYPE html>
<html>
<head>
    <title>Register - Campus Resolver</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="register-page">
<!-- Single Image Background - ONLY addition to HTML -->
<div class="background">    
    <div class="background-image">


<div class="form-container">
    <h2>Student Registration</h2>

    <form id="registerForm">
        <input type="text" id="name" placeholder="Full Name" required>
        <input type="email" id="email" placeholder="Email" required>
        <input type="text" id="department" placeholder="Department" required>

        <div class="password-container">
            <input type="password" id="password" placeholder="Password" required>
            <span class="toggle-password" onclick="togglePassword()">👁</span>
        </div>

        <small id="password-message">
            Password must be at least 6 characters
        </small>

        <button type="submit">Register</button>
    </form>

    <p>Already have an account? <a href="login.html">Login</a></p>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

// 🔥 Paste your Firebase config here
const firebaseConfig = {
  apiKey: "AIzaSyDD4PDJ-2dGabACe5Tn1y4L62KRqQY2_2E",
  authDomain: "cims-project-a2ab9.firebaseapp.com",
  projectId: "cims-project-a2ab9",
  storageBucket: "cims-project-a2ab9.firebasestorage.app",
  messagingSenderId: "88316003268",
  appId: "1:88316003268:web:658e5cac8459c8b6785a91",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

document.getElementById("registerForm").addEventListener("submit", async (e) => {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const department = document.getElementById("department").value;
    const password = document.getElementById("password").value;

    try {
        const userCredential = await createUserWithEmailAndPassword(auth, email, password);
        const user = userCredential.user;

        // Save extra details in Firestore
        await setDoc(doc(db, "students", user.uid), {
            name: name,
            email: email,
            department: department,
            role: "student",
            password: password,
        });

        alert("Registration Successful!");
        window.location.href = "login.html";

    } catch (error) {
        alert(error.message);
    }
});

document.addEventListener("DOMContentLoaded", () => {

    const password = document.getElementById("password");
    const toggle = document.querySelector(".toggle-password");
    const message = document.getElementById("password-message");

    // Show / Hide Password
    toggle.addEventListener("click", () => {
        if (password.type === "password") {
            password.type = "text";
        } else {
            password.type = "password";
        }
    });

    // Password length validation
    password.addEventListener("input", () => {
        if (password.value.length < 6) {
            message.style.color = "red";
        } else {
            message.style.color = "green";
        }
    });

});

</script>

</body>
</html>
