<!DOCTYPE html>
<html>
<head>
    <title>My Complaints</title>
    <link rel="stylesheet" href="style.css">
</head>

    <h1>My Complaints</h1>
    <body class="my-complaints-page">
        
    <nav>
        <h2>Campus Resolver</h2>
        <div>
            <a href="dashboard.html">Dashboard</a>
            <a href="my-complaints.html" class="active">My Complaints</a>
            <a href="submit.html">Submit Complaint</a>
            <a href="index.html">Logout</a>
        </div>
    </nav>
    <!-- Your my complaints content -->


    <div id="complaintsContainer">
        <!-- Complaints will appear here dynamically -->
    </div>
     
    

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs, orderBy } 
        from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        // 🔥 Your Firebase config
        const firebaseConfig = {
          apiKey: "AIzaSyDD4PDJ-2dGabACe5Tn1y4L62KRqQY2_2E",
  authDomain: "cims-project-a2ab9.firebaseapp.com",
  projectId: "cims-project-a2ab9",
  storageBucket: "cims-project-a2ab9.firebasestorage.app",
  messagingSenderId: "88316003268",
  appId: "1:88316003268:web:658e5cac8459c8b6785a91",
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const container = document.getElementById("complaintsContainer");

        // Check if user is logged in
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Fetch complaints where userEmail matches
                const userEmail = user.email;
                const q = query(
                    collection(db, "complaints"), 
                    where("userEmail", "==", user.email)
                );

                const querySnapshot = await getDocs(q);

                if (querySnapshot.empty) {
                    container.innerHTML = "<p>No complaints submitted yet.</p>";
                } else {
                    querySnapshot.forEach((doc) => {
                        const data = doc.data();
                        const div = document.createElement("div");
                        div.classList.add("complaintCard");
                        div.innerHTML = `
                            <h3>${data.title}</h3>
                            <p>${data.description}</p>
                            <p><strong>Building:</strong> ${data.building}</p>
                            <p><strong>Room:</strong> ${data.room}</p>
                            <p><strong>Priority:</strong> ${data.priority}</p>
                            <p><strong>Status:</strong> ${data.status}</p>
                            <p><strong>Submitted on:</strong> ${data.createdAt.toDate().toLocaleString()}</p>
                        `;
                        container.appendChild(div);
                    });
                }
                
            } else {
                // Not logged in → redirect to login
                window.location.href = "login.html";
            }
        });
    </script>



</body>
</html>
